[theme]
primaryColor = "#0066FF"
backgroundColor = "#0F1419"
secondaryBackgroundColor = "#1a1f2e"
textColor = "#E0E6ED"
font = "sans serif"

[client]
showErrorDetails = true
logger.level = "info"
showSidebarNavigation = true
toolbarMode = "developer"
maxUploadSize = 200

[server]
port = 8501
headless = true
runOnSave = true
